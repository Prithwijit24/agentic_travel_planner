apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-travel-planner-config
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  DEFAULT_LLM_PROVIDER: "openai"
  DEFAULT_LLM_MODEL: "gpt-4o-mini"
  API_BASE_URL: "http://agentic-travel-planner-api"
  STREAMLIT_SERVER_PORT: "8501"
  WEB_CRAWL_BACKEND: "trafilatura"
  PROXY_ROUTING_STRATEGY: "direct"
  VECTOR_STORE_DIR: "/app/data/chroma"
  KNOWLEDGE_BASE_DIR: "/app/data/knowledge"
  OPERATIONS_DB_PATH: "/app/data/operations/plans.db"
  EVALUATION_DIR: "/app/data/evaluation"
  ENABLE_PROMETHEUS_METRICS: "true"
